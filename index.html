<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CloudFront Practice Site</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center;
            border-top: 8px solid #ff9900;
        }
        h1 { color: #232f3e; }
        .status { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        
        <h1>My Automated Portfolio is Live!</h1>
        <p>This file is being served from <strong>S3</strong> via <strong>CloudFront</strong>.</p>
        <p class="status">✔ Secure Connection Active</p>
    </div>
</body>
</html>
